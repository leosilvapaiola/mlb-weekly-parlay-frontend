<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Parlay Tracker - Tabla General 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1628;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .mlb-logo { width: 50px; height: 50px; }
        h1 { font-size: 1.8em; }
        .back-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .back-btn:hover { background: #5a6fd6; }
        
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            background: #0f1f3d;
            border-radius: 10px;
            overflow: hidden;
            font-size: 0.95em;
        }
        .stats-table th {
            background: #1a2d50;
            padding: 12px 10px;
            text-align: left;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            border-bottom: 2px solid #2a3f65;
            position: relative;
        }
        .stats-table th:hover { background: #243a5e; }
        .stats-table th .sort-arrow { margin-left: 4px; font-size: 0.7em; opacity: 0.5; }
        .stats-table th.sorted .sort-arrow { opacity: 1; }
        .stats-table td {
            padding: 10px;
            border-bottom: 1px solid #1a2d50;
        }
        .stats-table tr:hover td { background: #162744; }
        .stats-table .jugador { color: #e74c3c; font-weight: bold; }
        .stats-table .pct { font-weight: bold; }
        
        @media (max-width: 700px) {
            .stats-table { font-size: 0.8em; }
            .stats-table th, .stats-table td { padding: 8px 5px; }
        }

</style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-row">
                <img src="https://www.mlbstatic.com/team-logos/league-on-dark/1.svg" alt="MLB" class="mlb-logo">
                <h1>Tabla General 2026</h1>
            </div>
            <a href="index.html" class="back-btn">⬅ Volver al Tracker</a>
            <a href="dashboards.html" class="back-btn" style="background:#e67e22; margin-left:10px;">📊 Estadísticas</a>
        </header>
        <div id="loading" style="text-align:center; padding:40px; font-size:1.2em;">Cargando datos...</div>
        <div id="tableContainer" style="display:none;"></div>
    </div>

    <script>
        let currentSort = { col: 'pct', asc: false };
        let tableData = [];

        async function loadData() {
            try {
                const resp = await fetch('data/history.json');
                if (!resp.ok) throw new Error('No se pudo cargar history.json');
                const raw = await resp.json();
                tableData = computeStats(raw);
                renderTable();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'block';
            } catch (e) {
                document.getElementById('loading').textContent = 'Error: ' + e.message;
            }
        }

        function computeStats(records) {
            const players = {};
            records.forEach(r => {
                const name = r.jugador;
                if (!players[name]) {
                    players[name] = { jugador: name, aciertos: 0, desaciertos: 0, fav: 0, aciertoFav: 0, noFav: 0, aciertoNoFav: 0 };
                }
                const p = players[name];
                const isWin = r.resultado === 'Ganador';
                const isLoss = r.resultado === 'Perdedor';
                if (isWin) p.aciertos++;
                if (isLoss) p.desaciertos++;

                // Determinar favorito: el equipo con odds negativos (más bajo) es favorito
                // En formato americano: odds < 0 = favorito, odds > 0 = underdog
                // Si odds_local > odds_visitante (ej: +130 > -150), el visitante es favorito
                const oddsLocal = Number(r.odds_local) || 0;
                const oddsVisitante = Number(r.odds_visitante) || 0;
                let favTeam = '';
                if (oddsLocal !== 0 || oddsVisitante !== 0) {
                    favTeam = oddsLocal > oddsVisitante ? r.equipo_visitante : r.equipo_local;
                }
                const apostoFav = favTeam && r.equipo_apostado === favTeam;
                if (apostoFav) {
                    p.fav++;
                    if (isWin) p.aciertoFav++;
                } else if (favTeam) {
                    p.noFav++;
                    if (isWin) p.aciertoNoFav++;
                }
            });

            return Object.values(players).map(p => {
                const total = p.aciertos + p.desaciertos;
                p.pct = total > 0 ? p.aciertos / total : 0;
                return p;
            });
        }

        function sortData(col) {
            if (currentSort.col === col) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.col = col;
                currentSort.asc = col === 'jugador';
            }
            renderTable();
        }

        function renderTable() {
            const col = currentSort.col;
            const asc = currentSort.asc;
            const sorted = [...tableData].sort((a, b) => {
                let va = a[col], vb = b[col];
                if (typeof va === 'string') {
                    return asc ? va.localeCompare(vb) : vb.localeCompare(va);
                }
                return asc ? va - vb : vb - va;
            });

            const arrow = (c) => {
                if (currentSort.col !== c) return '<span class="sort-arrow">⇅</span>';
                return '<span class="sort-arrow">' + (currentSort.asc ? '▲' : '▼') + '</span>';
            };
            const cls = (c) => currentSort.col === c ? 'sorted' : '';

            let html = '<table class="stats-table"><thead><tr>';
            const cols = [
                { key: 'jugador', label: 'Jugador' },
                { key: 'aciertos', label: 'W' },
                { key: 'desaciertos', label: 'L' },
                { key: 'pct', label: '%' },
                { key: 'fav', label: 'Fav' },
                { key: 'aciertoFav', label: 'W-Fav' },
                { key: 'noFav', label: 'NoFav' },
                { key: 'aciertoNoFav', label: 'W-NoFav' }
            ];
            cols.forEach(c => {
                html += '<th class="' + cls(c.key) + '" onclick="sortData(\'' + c.key + '\')">' + c.label + arrow(c.key) + '</th>';
            });
            html += '</tr></thead><tbody>';

            sorted.forEach(row => {
                const pctStr = (row.pct * 100).toFixed(0) + '%';
                html += '<tr>' +
                    '<td class="jugador">' + row.jugador + '</td>' +
                    '<td>' + row.aciertos + '</td>' +
                    '<td>' + row.desaciertos + '</td>' +
                    '<td class="pct">' + pctStr + '</td>' +
                    '<td>' + row.fav + '</td>' +
                    '<td>' + row.aciertoFav + '</td>' +
                    '<td>' + row.noFav + '</td>' +
                    '<td>' + row.aciertoNoFav + '</td>' +
                    '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        loadData();
    </script>
</body>
</html>
