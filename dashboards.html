<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Parlay Tracker - Estadísticas 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1628;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 25px; }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .mlb-logo { width: 50px; height: 50px; }
        h1 { font-size: 1.8em; }
        .nav-row { margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        .nav-btn:hover { background: #5a6fd6; }
</style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-row">
                <img src="https://www.mlbstatic.com/team-logos/league-on-dark/1.svg" alt="MLB" class="mlb-logo">
                <h1>Estadísticas 2026</h1>
            </div>
            <div class="nav-row">
                <a href="index.html" class="nav-btn">⬅ Tracker</a>
                <a href="stats.html" class="nav-btn">📋 Tabla General</a>
            </div>
        </header>

        <div style="text-align:center; margin-bottom:25px;">
            <select id="dashSelect" onchange="switchDashboard(this.value)" style="
                background:#1a2d50; color:white; border:2px solid #2a3f65;
                padding:10px 20px; border-radius:10px; font-size:1em;
                cursor:pointer; min-width:280px;">
                <option value="grupo">Tabla General por Grupo</option>
                <option value="favnofav">Métricas Fav/NoFav</option>
                <option value="placeholder2">Rachas por jugador y grupos</option>
            </select>
        </div>

        <div id="loading" style="text-align:center; padding:40px; font-size:1.2em;">Cargando datos...</div>

        <!-- Dashboard: Tabla General por Grupo -->
        <div id="dash-grupo" class="dashboard-panel" style="display:none;">
            <div id="grupoContent" style="display:flex; flex-direction:column; gap:30px;"></div>
        </div>

        <!-- Dashboard: Métricas Fav/NoFav -->
        <div id="dash-favnofav" class="dashboard-panel" style="display:none;">
            <div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap; margin-bottom:25px;">
                <select id="fnFecha" onchange="renderFavNoFav()" style="background:#1a2d50; color:white; border:2px solid #2a3f65; padding:8px 15px; border-radius:8px; font-size:0.95em; cursor:pointer;">
                    <option value="ALL">Fecha: ALL</option>
                </select>
                <select id="fnGrupo" onchange="renderFavNoFav()" style="background:#1a2d50; color:white; border:2px solid #2a3f65; padding:8px 15px; border-radius:8px; font-size:0.95em; cursor:pointer;">
                    <option value="ALL">Grupo: ALL</option>
                    <option value="A">Grupo: A</option>
                    <option value="B">Grupo: B</option>
                </select>
            </div>
            <div style="display:flex; align-items:center; justify-content:center; gap:40px; flex-wrap:wrap;">
                <div style="text-align:center;">
                    <div style="font-size:1.1em; font-weight:bold; margin-bottom:10px; color:#667eea;">Selección Fav / NoFav</div>
                    <canvas id="favPieChart" width="260" height="260"></canvas>
                </div>
                <div style="display:flex; gap:25px;">
                    <div class="scoreboard">
                        <div class="scoreboard-label">Aciertos Fav</div>
                        <div class="scoreboard-number" id="fnWFav">0</div>
                    </div>
                    <div class="scoreboard">
                        <div class="scoreboard-label">Aciertos NoFav</div>
                        <div class="scoreboard-number" id="fnWNoFav">0</div>
                    </div>
                </div>
            </div>
            <div id="fnTopDescription" style="max-width:600px; margin:15px auto 0; font-size:0.85em; color:#8899aa; line-height:1.5; text-align:center;"></div>
            
            <!-- Resumen Jornadas -->
            <hr style="border:none; border-top:2px solid #2a3f65; margin:30px 0;">
            <div style="text-align:center; font-size:1.1em; font-weight:bold; color:#667eea; margin-bottom:20px;">Resumen Jornadas de Apuestas</div>
            <div style="display:flex; align-items:center; justify-content:center; gap:40px; flex-wrap:wrap;">
                <div id="fnDescription" style="max-width:400px; font-size:0.95em; color:#ccd; line-height:1.6; text-align:center;"></div>
                <div style="text-align:center;">
                    <canvas id="jornadaPieChart" width="220" height="220"></canvas>
                </div>
            </div>
            
            <!-- Recomendación semanal -->
            <div style="display:flex; gap:25px; justify-content:center; flex-wrap:wrap; margin-top:25px;">
                <div class="scoreboard">
                    <div class="scoreboard-label">Escoger N° Fav</div>
                    <div class="scoreboard-number" id="fnRecFav">0</div>
                </div>
                <div class="scoreboard">
                    <div class="scoreboard-label">Escoger N° NoFav</div>
                    <div class="scoreboard-number" id="fnRecNoFav">0</div>
                </div>
            </div>
            <div id="fnRecDescription" style="max-width:600px; margin:15px auto 0; font-size:0.85em; color:#8899aa; line-height:1.5; text-align:center;"></div>
        </div>
        <!-- Dashboard: Rachas por jugador y grupos -->
        <div id="dash-placeholder2" class="dashboard-panel" style="display:none;">
            <div style="text-align:center; font-size:1.1em; font-weight:bold; color:#667eea; margin-bottom:20px;">Aciertos por Grupo por Semana</div>
            <canvas id="parlayBarChart" height="300"></canvas>
            
            <hr style="border:none; border-top:2px solid #2a3f65; margin:30px 0;">
            <div style="text-align:center; font-size:1.1em; font-weight:bold; color:#667eea; margin-bottom:20px;">Racha Actual por Jugador</div>
            <div id="rachasContent" style="display:flex; flex-direction:column; gap:20px;"></div>
        </div>
    </div>

    <style>
        .grupo-table {
            width: 100%;
            border-collapse: collapse;
            background: #0f1f3d;
            border-radius: 10px;
            overflow: hidden;
            font-size: 0.9em;
        }
        .grupo-table th {
            background: #1a2d50;
            padding: 10px 8px;
            text-align: left;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            border-bottom: 2px solid #2a3f65;
        }
        .grupo-table th:hover { background: #243a5e; }
        .grupo-table th .sort-arrow { margin-left: 3px; font-size: 0.7em; opacity: 0.5; }
        .grupo-table th.sorted .sort-arrow { opacity: 1; }
        .grupo-table td { padding: 8px; border-bottom: 1px solid #1a2d50; }
        .grupo-table tr:hover td { background: #162744; }
        .grupo-table .jugador { color: #e74c3c; font-weight: bold; }
        .grupo-table .pct { font-weight: bold; }
        .grupo-card {
            width: 100%;
            background: #0f1f3d;
            border-radius: 12px;
            padding: 15px;
        }
        .grupo-card h3 { text-align: center; margin-bottom: 12px; color: #667eea; }
        @media (max-width: 700px) {
            .grupo-table { font-size: 0.75em; }
            .grupo-table th, .grupo-table td { padding: 6px 4px; }
        }
        .scoreboard {
            background: #0f1f3d;
            border: 3px solid #2a3f65;
            border-radius: 15px;
            padding: 20px 30px;
            text-align: center;
            min-width: 120px;
        }
        .scoreboard-label {
            font-size: 1em;
            font-weight: bold;
            color: #8899aa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .scoreboard-number {
            font-size: 3em;
            font-weight: bold;
            color: #25D366;
            font-family: 'Courier New', monospace;
        }
        .racha-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #0f1f3d;
            border-radius: 8px;
        }
        .racha-name {
            min-width: 130px;
            font-weight: bold;
            color: #e74c3c;
            font-size: 0.9em;
        }
        .racha-dots {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            flex: 1;
        }
        .racha-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: bold;
        }
        .racha-dot.win { background: #28a745; }
        .racha-dot.loss { background: #dc3545; }
        .racha-streak {
            min-width: 80px;
            text-align: right;
            font-weight: bold;
            font-size: 0.9em;
        }
        .racha-streak.hot { color: #28a745; }
        .racha-streak.cold { color: #dc3545; }
    </style>

    <script>
        let rawData = [];
        let sortState = { A: { col: 'pct', asc: false }, B: { col: 'pct', asc: false } };

        function switchDashboard(id) {
            document.querySelectorAll('.dashboard-panel').forEach(el => el.style.display = 'none');
            const panel = document.getElementById('dash-' + id);
            if (panel) panel.style.display = 'block';
        }

        async function loadData() {
            try {
                const resp = await fetch('data/history.json');
                if (!resp.ok) throw new Error('No se pudo cargar history.json');
                rawData = await resp.json();
                renderGrupos();
                document.getElementById('loading').style.display = 'none';
                switchDashboard('grupo');
            } catch (e) {
                document.getElementById('loading').textContent = 'Error: ' + e.message;
            }
        }

        function computeGroupStats(records, group) {
            const suffix = '(' + group + ')';
            const filtered = records.filter(r => r.jugador && r.jugador.endsWith(suffix));
            const players = {};
            filtered.forEach(r => {
                const name = r.jugador;
                if (!players[name]) {
                    players[name] = { jugador: name, aciertos: 0, desaciertos: 0, fav: 0, aciertoFav: 0, noFav: 0, aciertoNoFav: 0 };
                }
                const p = players[name];
                const isWin = r.resultado === 'Ganador';
                const isLoss = r.resultado === 'Perdedor';
                if (isWin) p.aciertos++;
                if (isLoss) p.desaciertos++;
                const oddsLocal = Number(r.odds_local) || 0;
                const oddsVisitante = Number(r.odds_visitante) || 0;
                let favTeam = '';
                if (oddsLocal !== 0 || oddsVisitante !== 0) {
                    favTeam = oddsLocal > oddsVisitante ? r.equipo_visitante : r.equipo_local;
                }
                const apostoFav = favTeam && r.equipo_apostado === favTeam;
                if (apostoFav) { p.fav++; if (isWin) p.aciertoFav++; }
                else if (favTeam) { p.noFav++; if (isWin) p.aciertoNoFav++; }
            });
            return Object.values(players).map(p => {
                const total = p.aciertos + p.desaciertos;
                p.pct = total > 0 ? p.aciertos / total : 0;
                return p;
            });
        }

        function renderGroupTable(data, group) {
            const s = sortState[group];
            const sorted = [...data].sort((a, b) => {
                let va = a[s.col], vb = b[s.col];
                if (typeof va === 'string') return s.asc ? va.localeCompare(vb) : vb.localeCompare(va);
                return s.asc ? va - vb : vb - va;
            });
            const arrow = (c) => s.col !== c ? '<span class="sort-arrow">⇅</span>' : '<span class="sort-arrow">' + (s.asc ? '▲' : '▼') + '</span>';
            const cls = (c) => s.col === c ? 'sorted' : '';
            const cols = [
                { key: 'jugador', label: 'Jugador' }, { key: 'aciertos', label: 'W' },
                { key: 'desaciertos', label: 'L' }, { key: 'pct', label: '%' },
                { key: 'fav', label: 'Fav' }, { key: 'aciertoFav', label: 'W-Fav' },
                { key: 'noFav', label: 'NoFav' }, { key: 'aciertoNoFav', label: 'W-NoFav' }
            ];
            let html = '<table class="grupo-table"><thead><tr>';
            cols.forEach(c => {
                html += '<th class="' + cls(c.key) + '" onclick="sortGroup(\'' + group + '\',\'' + c.key + '\')">' + c.label + arrow(c.key) + '</th>';
            });
            html += '</tr></thead><tbody>';
            sorted.forEach(row => {
                html += '<tr><td class="jugador">' + row.jugador + '</td>' +
                    '<td>' + row.aciertos + '</td><td>' + row.desaciertos + '</td>' +
                    '<td class="pct">' + (row.pct * 100).toFixed(0) + '%</td>' +
                    '<td>' + row.fav + '</td><td>' + row.aciertoFav + '</td>' +
                    '<td>' + row.noFav + '</td><td>' + row.aciertoNoFav + '</td></tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        function sortGroup(group, col) {
            const s = sortState[group];
            if (s.col === col) { s.asc = !s.asc; } else { s.col = col; s.asc = col === 'jugador'; }
            renderGrupos();
        }

        function renderGrupos() {
            const dataA = computeGroupStats(rawData, 'A');
            const dataB = computeGroupStats(rawData, 'B');
            document.getElementById('grupoContent').innerHTML =
                '<div class="grupo-card"><h3>Grupo A</h3>' + renderGroupTable(dataA, 'A') + '</div>' +
                '<div class="grupo-card"><h3>Grupo B</h3>' + renderGroupTable(dataB, 'B') + '</div>';
        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script>
        let favPieInstance = null;
        let jornadaPieInstance = null;

        function populateFechaDropdown() {
            const fechas = [...new Set(rawData.map(r => r.fecha).filter(Boolean))];
            fechas.sort((a, b) => {
                const parseDate = (s) => {
                    const parts = s.split('-');
                    if (parts.length === 4) return new Date(parts[3], parts[2] - 1, parts[1]);
                    return new Date(s);
                };
                return parseDate(b) - parseDate(a);
            });
            const sel = document.getElementById('fnFecha');
            sel.innerHTML = '<option value="ALL">Fecha: ALL</option>';
            fechas.forEach(f => {
                sel.innerHTML += '<option value="' + f + '">' + f + '</option>';
            });
        }

        function renderFavNoFav() {
            const fecha = document.getElementById('fnFecha').value;
            const grupo = document.getElementById('fnGrupo').value;

            let filtered = rawData;
            if (fecha !== 'ALL') filtered = filtered.filter(r => r.fecha === fecha);
            if (grupo !== 'ALL') filtered = filtered.filter(r => r.jugador && r.jugador.endsWith('(' + grupo + ')'));

            let totalFav = 0, totalNoFav = 0, wFav = 0, wNoFav = 0;
            filtered.forEach(r => {
                const oddsLocal = Number(r.odds_local) || 0;
                const oddsVisitante = Number(r.odds_visitante) || 0;
                if (oddsLocal === 0 && oddsVisitante === 0) return;
                const favTeam = oddsLocal > oddsVisitante ? r.equipo_visitante : r.equipo_local;
                const isWin = r.resultado === 'Ganador';
                if (r.equipo_apostado === favTeam) {
                    totalFav++;
                    if (isWin) wFav++;
                } else {
                    totalNoFav++;
                    if (isWin) wNoFav++;
                }
            });

            document.getElementById('fnWFav').innerHTML = wFav + '<span style="font-size:0.4em; color:#8899aa; margin-left:4px;">(' + (totalFav > 0 ? ((wFav/totalFav)*100).toFixed(0) : 0) + '%)</span>';
            document.getElementById('fnWNoFav').innerHTML = wNoFav + '<span style="font-size:0.4em; color:#8899aa; margin-left:4px;">(' + (totalNoFav > 0 ? ((wNoFav/totalNoFav)*100).toFixed(0) : 0) + '%)</span>';

            // Top section explanation
            const wFavPctStr = totalFav > 0 ? ((wFav/totalFav)*100).toFixed(0) : 0;
            const wNoFavPctStr = totalNoFav > 0 ? ((wNoFav/totalNoFav)*100).toFixed(0) : 0;
            document.getElementById('fnTopDescription').innerHTML =
                'La torta muestra cuántas veces se escogió al <strong style="color:#3b82f6;">Favorito</strong> vs al <strong style="color:#e74c3c;">No Favorito</strong>. ' +
                'Los tableros indican cuántas de esas selecciones fueron acertadas: de <strong>' + totalFav + '</strong> veces que se apostó al Fav, se acertó <strong>' + wFav + '</strong> (' + wFavPctStr + '%). ' +
                'De <strong>' + totalNoFav + '</strong> veces al NoFav, se acertó <strong>' + wNoFav + '</strong> (' + wNoFavPctStr + '%).';

            // Pie chart
            const ctx = document.getElementById('favPieChart').getContext('2d');
            if (favPieInstance) favPieInstance.destroy();

            const total = totalFav + totalNoFav;
            const favPct = total > 0 ? ((totalFav / total) * 100).toFixed(1) : 0;
            const noFavPct = total > 0 ? ((totalNoFav / total) * 100).toFixed(1) : 0;

            favPieInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Fav (' + totalFav + ') ' + favPct + '%', 'NoFav (' + totalNoFav + ') ' + noFavPct + '%'],
                    datasets: [{
                        data: [totalFav, totalNoFav],
                        backgroundColor: ['#3b82f6', '#e74c3c'],
                        borderColor: ['#2563eb', '#c0392b'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: 'white', font: { size: 14 } } },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const pct = ctx.label.includes('Fav (') ? favPct : noFavPct;
                                    return ctx.label + ' - ' + pct + '%';
                                }
                            }
                        }
                    }
                }
            });

            // Description + Jornada pie
            const totalJornadaNoFav = totalFav - wFav + wNoFav;
            const totalJornadaFav = total - totalJornadaNoFav;
            const jFavPct = total > 0 ? ((totalJornadaFav / total) * 100).toFixed(1) : 0;
            const jNoFavPct = total > 0 ? ((totalJornadaNoFav / total) * 100).toFixed(1) : 0;

            document.getElementById('fnDescription').innerHTML =
                'De las <strong>' + total + '</strong> apuestas realizadas, el favorito ganó en <strong style="color:#3b82f6;">' +
                totalJornadaFav + '</strong> ocasiones (<strong>' + jFavPct + '%</strong>) mientras que el no favorito se impuso en <strong style="color:#e74c3c;">' +
                totalJornadaNoFav + '</strong> (<strong>' + jNoFavPct + '%</strong>).';

            // Jornada pie chart
            const ctx2 = document.getElementById('jornadaPieChart').getContext('2d');
            if (jornadaPieInstance) jornadaPieInstance.destroy();
            jornadaPieInstance = new Chart(ctx2, {
                type: 'pie',
                data: {
                    labels: ['Jornada Fav (' + totalJornadaFav + ') ' + jFavPct + '%', 'Jornada NoFav (' + totalJornadaNoFav + ') ' + jNoFavPct + '%'],
                    datasets: [{
                        data: [totalJornadaFav, totalJornadaNoFav],
                        backgroundColor: ['#3b82f6', '#e74c3c'],
                        borderColor: ['#2563eb', '#c0392b'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: 'white', font: { size: 13 } } },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const pct = ctx.dataIndex === 0 ? jFavPct : jNoFavPct;
                                    return ctx.label + ' - ' + pct + '%';
                                }
                            }
                        }
                    }
                }
            });

            // Recommendation: how many Fav/NoFav to pick per week
            const ticketSize = grupo !== 'ALL' ? 8 : 16;
            const favRatio = total > 0 ? totalJornadaFav / total : 0.5;
            const noFavRatio = total > 0 ? totalJornadaNoFav / total : 0.5;
            const rawRecFav = ticketSize * favRatio;
            const rawRecNoFav = ticketSize * noFavRatio;
            const roundUp01 = (n) => { const f = n - Math.floor(n); return f >= 0.1 ? Math.ceil(n) : Math.floor(n); };
            const recFav = roundUp01(rawRecFav);
            const recNoFav = ticketSize - recFav;

            document.getElementById('fnRecFav').textContent = recFav;
            document.getElementById('fnRecNoFav').textContent = recNoFav;

            const grupoLabel = grupo !== 'ALL' ? 'del Grupo ' + grupo : 'semanales (ambos grupos)';
            document.getElementById('fnRecDescription').innerHTML =
                'Basado en el histórico, el favorito gana el <strong>' + jFavPct + '%</strong> de las veces. ' +
                'De las <strong>' + ticketSize + '</strong> apuestas ' + grupoLabel + ', se recomienda escoger <strong style="color:#3b82f6;">' + recFav + ' favoritos</strong> y ' +
                '<strong style="color:#e74c3c;">' + recNoFav + ' no favoritos</strong> para maximizar la probabilidad de acierto.';
        }

        function parseDate(s) {
            const parts = s.split('-');
            if (parts.length === 4) return new Date(parts[3], parts[2] - 1, parts[1]);
            return new Date(s);
        }

        function renderRachas() {
            // --- Bar chart: aciertos por grupo por semana ---
            const fechas = [...new Set(rawData.map(r => r.fecha).filter(Boolean))];
            fechas.sort((a, b) => parseDate(a) - parseDate(b));

            const aByWeek = fechas.map(f => {
                const week = rawData.filter(r => r.fecha === f && r.jugador && r.jugador.endsWith('(A)'));
                return week.filter(r => r.resultado === 'Ganador').length;
            });
            const bByWeek = fechas.map(f => {
                const week = rawData.filter(r => r.fecha === f && r.jugador && r.jugador.endsWith('(B)'));
                return week.filter(r => r.resultado === 'Ganador').length;
            });

            const ctx = document.getElementById('parlayBarChart').getContext('2d');
            if (parlayBarInstance) parlayBarInstance.destroy();
            parlayBarInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: fechas,
                    datasets: [
                        { label: 'Grupo A', data: aByWeek, backgroundColor: '#3b82f6', borderRadius: 4 },
                        { label: 'Grupo B', data: bByWeek, backgroundColor: '#e74c3c', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, max: 8, ticks: { color: '#8899aa', stepSize: 1 }, grid: { color: '#1a2d50' } },
                        x: { ticks: { color: '#8899aa', font: { size: 10 } }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { labels: { color: 'white' } },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) { return ctx.dataset.label + ': ' + ctx.raw + '/8 aciertos'; }
                            }
                        }
                    }
                }
            });

            // --- Rachas por jugador ---
            const groups = ['A', 'B'];
            let rachasHTML = '';
            groups.forEach(g => {
                const suffix = '(' + g + ')';
                const players = [...new Set(rawData.filter(r => r.jugador && r.jugador.endsWith(suffix)).map(r => r.jugador))].sort();
                rachasHTML += '<div class="grupo-card"><h3>Grupo ' + g + '</h3>';
                players.forEach(name => {
                    const records = rawData.filter(r => r.jugador === name);
                    records.sort((a, b) => parseDate(a.fecha) - parseDate(b.fecha));

                    // Build dots
                    let dots = '';
                    records.forEach(r => {
                        const isWin = r.resultado === 'Ganador';
                        dots += '<div class="racha-dot ' + (isWin ? 'win' : 'loss') + '">' + (isWin ? 'W' : 'L') + '</div>';
                    });

                    // Calculate current streak
                    let streak = 0;
                    let streakType = '';
                    for (let i = records.length - 1; i >= 0; i--) {
                        const res = records[i].resultado === 'Ganador' ? 'W' : 'L';
                        if (streakType === '') streakType = res;
                        if (res === streakType) streak++;
                        else break;
                    }
                    const streakClass = streakType === 'W' ? 'hot' : 'cold';
                    const streakText = streak + streakType;
                    const shortName = name.replace(/ \([AB]\)$/, '');

                    rachasHTML += '<div class="racha-row">' +
                        '<div class="racha-name">' + shortName + '</div>' +
                        '<div class="racha-dots">' + dots + '</div>' +
                        '<div class="racha-streak ' + streakClass + '">' + streakText + '</div>' +
                        '</div>';
                });
                rachasHTML += '</div>';
            });
            document.getElementById('rachasContent').innerHTML = rachasHTML;
        }

        // Hook into loadData to also init Fav/NoFav
        const _origLoadData = loadData;
        loadData = async function() {
            await _origLoadData();
            populateFechaDropdown();
            renderFavNoFav();
            renderRachas();
        };
        loadData();
    </script>
</body>
</html>
